<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>Vexora•Code · Horizon</title>
  <!-- Font Awesome 6 (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="shortcut icon" href="terminal.png" type="image/x-icon">
  <!-- Firebase SDKs (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <style>
    /* ----- MODERN RESET & BOLD VISUALS (CRYSTAL CLEAR TITLES) ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-deep: #0a0f1e;
      --bg-card: #16213b;
      --primary-glow: #3b82f6;
      --primary-bold: #2563eb;
      --accent-blaze: #f97316;
      --success-emerald: #10b981;
      --danger-coral: #ef4444;
      --text-bright: #f8fafc;
      --text-soft: #cbd5e1;
      --border-aura: rgba(59, 130, 246, 0.5);
      --easy: #34d399;
      --medium: #fbbf24;
      --hard: #f87171;
      --expert: #c084fc;
      --font-display: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 40% 30%, #1e2b47, #0a0f1e 90%);
      font-family: var(--font-display);
      color: var(--text-bright);
      line-height: 1.5;
    }

    .app-container {
      max-width: 1440px;
      margin: 0 auto;
      padding: 1rem 1.5rem;
    }

    /* ----- AUTH (crisp & modern) ----- */
    .auth-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .auth-card {
      background: rgba(12, 20, 35, 0.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 3.5rem;
      padding: 3.5rem 2.5rem;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 40px 70px -15px #000000cc, 0 0 0 2px rgba(96, 165, 250, 0.3) inset;
      border: 1px solid rgba(255, 255, 255, 0.05);
      text-align: center;
    }

    /* ✅ ULTRA-BRIGHT TITLE: pure white with vibrant underline and shadow */
    .auth-title,
    .logo {
      font-size: 3.8rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      color: white;
      /* base pure white */
      text-shadow: 0 4px 20px #3b82f6, 0 0 40px #60a5fa, 0 0 60px #2563eb;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      filter: drop-shadow(0 8px 12px black);
      border-bottom: 4px solid transparent;
      border-image: linear-gradient(90deg, #ffdb9f, #60a5fa, #b79aff) 1;
      border-bottom-style: solid;
      /* ← vibrant underline */
      padding-bottom: 0.2rem;
    }

    .auth-title i,
    .logo i {
      font-size: 3.5rem;
      color: white;
      text-shadow: 0 0 20px #60a5fa, 0 0 40px #3b82f6;
      -webkit-text-stroke: 1px rgba(255, 255, 240, 0.4);
    }

    .auth-sub {
      color: var(--text-soft);
      font-size: 1.3rem;
      margin-bottom: 2.5rem;
      border-bottom: 1px dashed #3b82f660;
      padding-bottom: 1.5rem;
    }

    .google-btn {
      width: 100%;
      padding: 1.1rem 1.5rem;
      background: white;
      border: none;
      border-radius: 4rem;
      font-size: 1.3rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 12px 25px -5px #000000b3;
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: #1e293b;
    }

    .google-btn:hover {
      transform: scale(1.02) translateY(-4px);
      background: #f5f9ff;
      box-shadow: 0 25px 35px -5px var(--primary-glow);
    }

    /* ----- MAIN APP (hidden initially) ----- */
    .main-app {
      display: none;
    }

    /* ----- NAVBAR with super-clear logo ----- */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0 1.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      gap: 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .logo {
      font-size: 2.8rem;
      border-bottom: 4px solid transparent;
      border-image: linear-gradient(90deg, #ffdb9f, #60a5fa, #b79aff) 1;
      border-bottom-style: solid;
    }

    .logo i {
      font-size: 2.6rem;
    }

    .user-menu {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      background: rgba(255, 255, 255, 0.04);
      padding: 0.5rem 1.5rem 0.5rem 1.8rem;
      border-radius: 4rem;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 5px 20px black;
    }

    .user-menu i {
      font-size: 1.8rem;
      color: var(--primary-glow);
    }

    #userName {
      font-weight: 600;
      color: white;
      max-width: 180px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .logout-btn {
      padding: 0.5rem 1.3rem;
      background: rgba(248, 113, 113, 0.15);
      border: 1px solid var(--danger-coral);
      border-radius: 3rem;
      color: var(--danger-coral);
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.95rem;
    }

    .logout-btn:hover {
      background: var(--danger-coral);
      color: #0b1120;
      border-color: transparent;
    }

    /* ----- LANGUAGE GRID ----- */
    .languages-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 1.2rem;
      margin: 1.5rem 0 2rem;
    }

    .lang-card {
      background: rgba(16, 24, 40, 0.8);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 2rem;
      padding: 1.4rem 1rem;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 15px 25px -10px black;
      position: relative;
      overflow: hidden;
    }

    .lang-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 2rem;
      padding: 2px;
      background: linear-gradient(145deg, transparent 30%, var(--primary-glow), transparent 70%);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: 0;
      transition: 0.3s;
    }

    .lang-card:hover::before {
      opacity: 0.7;
    }

    .lang-card:hover {
      transform: translateY(-6px) scale(1.02);
      background: rgba(28, 40, 60, 0.95);
    }

    .lang-card.selected {
      border: 2px solid var(--primary-glow);
      background: rgba(37, 99, 235, 0.2);
      box-shadow: 0 0 30px #2563eb;
    }

    .lang-icon {
      font-size: 2.6rem;
      margin-bottom: 0.8rem;
      filter: drop-shadow(0 6px 10px black);
    }

    .lang-name {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 0.2rem;
    }

    .lang-progress {
      font-size: 0.85rem;
      color: var(--text-soft);
    }

    .progress-bar {
      height: 5px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 6px;
      margin-top: 0.9rem;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary-bold), var(--accent-blaze));
      transition: width 0.4s ease;
    }

    /* ----- MAIN LAYOUT ----- */
    .main-content {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 1.8rem;
      margin-top: 1rem;
    }

    /* Levels sidebar */
    .levels-sidebar {
      background: rgba(14, 22, 38, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 2rem;
      padding: 1.5rem 0.8rem;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 20px 30px -10px black;
      height: fit-content;
      max-height: 70vh;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--primary-glow) #1e2a3a;
    }

    .levels-sidebar::-webkit-scrollbar {
      width: 5px;
    }

    .levels-sidebar::-webkit-scrollbar-track {
      background: #1e293b;
      border-radius: 10px;
    }

    .levels-sidebar::-webkit-scrollbar-thumb {
      background: var(--primary-glow);
      border-radius: 10px;
    }

    .levels-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding: 0 0.5rem 0.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .levels-header h2 {
      font-weight: 600;
      font-size: 1.4rem;
      color: white;
      text-shadow: 0 2px 8px #3b82f6;
    }

    .level-item {
      padding: 0.8rem 0.9rem;
      margin-bottom: 0.3rem;
      border-radius: 1.2rem;
      cursor: pointer;
      transition: 0.15s;
      border: 1px solid transparent;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.02);
      font-size: 0.95rem;
    }

    .level-item:hover {
      background: rgba(59, 130, 246, 0.2);
      border-color: var(--primary-glow);
    }

    .level-item.active {
      background: rgba(59, 130, 246, 0.3);
      border: 1px solid var(--primary-glow);
      box-shadow: 0 0 12px #3b82f6;
    }

    .level-difficulty {
      font-size: 0.7rem;
      padding: 0.2rem 0.7rem;
      border-radius: 2rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .difficulty-easy {
      background: #14532d80;
      color: var(--easy);
      border: 1px solid #34d39960;
    }

    .difficulty-medium {
      background: #713f1280;
      color: var(--medium);
      border: 1px solid #fbbf2460;
    }

    .difficulty-hard {
      background: #7f1d1d80;
      color: var(--hard);
      border: 1px solid #f8717160;
    }

    .difficulty-expert {
      background: #581c8780;
      color: var(--expert);
      border: 1px solid #c084fc60;
    }

    /* ----- QUESTION PANEL (ULTRA-CLEAR TITLE: PURE WHITE + BOLD SHADOW) ----- */
    .question-panel {
      background: rgba(14, 22, 38, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 2.5rem;
      padding: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 25px 40px -15px black;
    }

    .question-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.8rem;
      padding-bottom: 0.8rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* ✅ FIXED: pure white, heavy weight, strong glow */
    .question-title {
      font-size: 2.4rem;
      font-weight: 900;
      color: white;
      /* ← solid white */
      text-shadow: 0 4px 15px #3b82f6, 0 0 30px #60a5fa, 0 0 50px #2563eb;
      letter-spacing: -0.01em;
      border-left: 8px solid #60a5fa;
      padding-left: 1rem;
      line-height: 1.2;
    }

    .question-description {
      margin-bottom: 2rem;
      padding: 1.5rem;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 1.8rem;
      font-family: 'Fira Code', 'Monaco', monospace;
      white-space: pre-wrap;
      border-left: 6px solid var(--primary-glow);
      font-size: 1rem;
      line-height: 1.6;
      color: #e2e8f0;
    }

    .answer-input {
      width: 100%;
      min-height: 160px;
      padding: 1.3rem;
      background: #0b1221;
      border: 1px solid #2d3f5e;
      border-radius: 1.5rem;
      color: #deecff;
      font-family: 'Fira Code', monospace;
      font-size: 0.95rem;
      resize: vertical;
      box-shadow: 0 0 15px #00000080 inset;
    }

    .answer-input:focus {
      outline: none;
      border-color: var(--primary-glow);
      box-shadow: 0 0 20px #3b82f670, inset 0 0 8px black;
    }

    .actions {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      margin: 1.5rem 0 1rem;
    }

    .btn {
      padding: 0.7rem 1.8rem;
      border: none;
      border-radius: 3rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      border: 1px solid transparent;
    }

    .btn-primary {
      background: linear-gradient(145deg, #2563eb, #1d4ed8);
      color: white;
      box-shadow: 0 8px 14px -5px #0f2b5e;
    }

    .btn-primary:hover {
      background: linear-gradient(145deg, #3b82f6, #2563eb);
      transform: translateY(-2px);
      box-shadow: 0 16px 20px -8px #1e3a8a;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: var(--text-soft);
    }

    .btn-outline:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--primary-glow);
    }

    .feedback {
      margin-top: 1.5rem;
      padding: 1rem 1.5rem;
      border-radius: 2rem;
      display: none;
      font-weight: 500;
      border-left: 8px solid;
    }

    .feedback.success {
      background: rgba(16, 185, 129, 0.2);
      border-left-color: var(--success-emerald);
      display: block;
      color: #dcfce7;
    }

    .feedback.error {
      background: rgba(239, 68, 68, 0.2);
      border-left-color: var(--danger-coral);
      display: block;
      color: #fee2e2;
    }

    .certificate {
      text-align: center;
      padding: 2.5rem 1.5rem;
      background: linear-gradient(145deg, #b4530920, #7e22ce30);
      border-radius: 3rem;
      border: 2px solid var(--accent-blaze);
      box-shadow: 0 30px 40px -10px #f9731680, inset 0 0 50px #fcd34d30;
      backdrop-filter: blur(6px);
    }

    .certificate i {
      font-size: 4.5rem;
      color: gold;
      filter: drop-shadow(0 0 25px #fbbf24);
    }

    .certificate h2 {
      font-size: 2.5rem;
      font-weight: 800;
      color: white;
      text-shadow: 0 0 15px gold, 0 0 30px #f97316;
    }

    .hidden {
      display: none !important;
    }

    /* RESPONSIVE TWEAKS */
    @media (max-width: 800px) {
      .main-content {
        grid-template-columns: 1fr;
      }

      .question-title {
        font-size: 2rem;
      }

      .logo {
        font-size: 2.4rem;
      }

      .logo i {
        font-size: 2.2rem;
      }

      .auth-title {
        font-size: 3rem;
      }

      .languages-grid {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      }
    }

    @media (max-width: 500px) {
      .actions .btn {
        padding: 0.6rem 1.2rem;
        font-size: 0.9rem;
      }

      .question-title {
        font-size: 1.7rem;
      }

      .navbar {
        flex-direction: column;
        align-items: start;
      }

      .user-menu {
        width: 100%;
        justify-content: space-between;
      }
    }
  </style>
</head>

<body>
  <!-- AUTH SCREEN -->
  <div id="authScreen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-title">
        <i class="fas fa-code"></i> Vexora•Code
      </div>
      <div class="auth-sub">500 levels · true mastery</div>
      <button class="google-btn" id="googleSignIn">
        <i class="fab fa-google" style="color: #4285F4; font-size: 1.6rem;"></i>
        <span>continue with Google</span>
      </button>
      <p style="color: var(--text-soft); margin-top: 2rem;">
        <i class="fas fa-lock"></i> secured by Firebase
      </p>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="mainApp" class="main-app">
    <div class="app-container">
      <!-- Navbar with ultra-clear logo -->
      <nav class="navbar">
        <div class="logo">
          <i class="fas fa-terminal"></i> Vexora•Code
        </div>
        <div class="user-menu">
          <i class="fas fa-user-astronaut"></i>
          <span id="userName">Coder</span>
          <button class="logout-btn" id="logoutBtn">
            <i class="fas fa-sign-out-alt"></i> exit
          </button>
        </div>
      </nav>

      <!-- Language Grid -->
      <div class="languages-grid" id="languageGrid"></div>

      <!-- Main Content (levels + question) -->
      <div class="main-content" id="mainContent" style="display: none;">
        <!-- Levels Sidebar -->
        <div class="levels-sidebar">
          <div class="levels-header">
            <h2><span id="selectedLangName">JavaScript</span> · levels</h2>
            <span id="totalProgress">0/500</span>
          </div>
          <div id="levelsList" class="levels-list"></div>
        </div>

        <!-- Question Panel & Certificate -->
        <div class="question-panel">
          <div id="questionContainer">
            <div class="question-header">
              <h1 class="question-title" id="questionTitle">Level 1</h1>
              <span class="level-difficulty" id="difficultyBadge">Easy</span>
            </div>
            <div class="question-description" id="questionDescription">
              Select a level to begin
            </div>
            <div class="answer-area">
              <textarea class="answer-input" id="answerInput"
                placeholder="Write your solution here... (ctrl+enter to submit)"></textarea>
            </div>
            <div class="actions">
              <button class="btn btn-primary" id="submitAnswer"><i class="fas fa-paper-plane"></i> Submit</button>
              <button class="btn btn-outline" id="resetLevel"><i class="fas fa-undo-alt"></i> Reset</button>
              <button class="btn btn-outline" id="previousLevel"><i class="fas fa-chevron-left"></i> Prev</button>
              <button class="btn btn-outline" id="nextLevel">Next <i class="fas fa-chevron-right"></i></button>
            </div>
            <div class="feedback" id="feedback"></div>
          </div>

          <!-- Certificate (hidden until all complete) -->
          <div id="certificate" class="certificate hidden">
            <i class="fas fa-crown"></i>
            <h2>mastery unlocked</h2>
            <p style="font-size: 1.4rem;">You completed all 500 levels in <span id="certLang"></span>.</p>
            <p style="color: var(--text-soft); margin-top: 0.8rem;">✦ legendary developer ✦</p>
            <i class="fas fa-certificate" style="font-size: 4rem; margin-top: 1rem; color: var(--accent-blaze);"></i>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>

        'Go': ['goroutine', 'channel', 'interface', 'reflect', 'unsafe', 'cgo', 'plugin', 'sync', 'atomic', 'pprof'],
        'Rust': ['ownership', 'lifetime', 'trait', 'macro', 'unsafe', 'ffi', 'async', 'tokio', 'rayon', 'wasm'],
        'TypeScript': ['type', 'interface', 'generic', 'decorator', 'conditional', 'mapped', 'template', 'infer', 'namespace', 'compiler']
      };
      const fallbackTopics = topics[lang] || topics['JavaScript'];

      for (let i = 1; i <= 500; i++) {
        let difficulty;
        if (i <= 100) difficulty = 'easy';
        else if (i <= 200) difficulty = 'medium';
        else if (i <= 300) difficulty = 'hard';
        else difficulty = 'expert';

        const topic = fallbackTopics[(i - 1) % fallbackTopics.length];
        q.push({
          id: i,
          title: `Level ${i}: ${difficulty} · ${topic}`,
          description: `# ${lang} ${topic} challenge\n\nBuild a ${difficulty} implementation.\n\nRequirements:\n- Handle edge cases\n- Optimize for ${i > 200 ? 'performance' : 'readability'}\n- Use modern ${lang} features\n\nExample:\nInput: sample_${i}\nOutput: expected_result_${i}`,
          difficulty: difficulty,
        });
      }
      return q;
    }

    const questionsDB = {};
    languages.forEach(l => { questionsDB[l.id] = generateQuestions(l.name); });

    // ---------- STATE ----------
    let currentUser = null;
    let userProgress = {};
    let currentLang = 'javascript';
    let currentLevel = 1;

    function initProgress() {
      const p = {};
      languages.forEach(l => {
        p[l.id] = {
          completed: new Array(500).fill(false),
          currentLevel: 1,
          answers: {}
        };
      });
      return p;
    }

    async function loadUserProgress(uid) {
      try {
        const doc = await db.collection('userProgress').doc(uid).get();
        if (doc.exists) {
          userProgress = doc.data().progress || initProgress();
        } else {
          userProgress = initProgress();
          await saveUserProgress(uid);
        }
      } catch (e) {
        console.warn("using local fallback", e);
        userProgress = initProgress();
      }
      renderLanguageGrid();
      showLanguageContent(currentLang);
    }

    async function saveUserProgress(uid) {
      if (!uid) return;
      try {
        await db.collection('userProgress').doc(uid).set({
          progress: userProgress,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      } catch (e) { console.warn("save failed", e); }
    }

    function renderLanguageGrid() {
      const grid = document.getElementById('languageGrid');
      grid.innerHTML = languages.map(l => {
        const prog = userProgress[l.id] || { completed: new Array(500).fill(false) };
        const completedCount = prog.completed.filter(Boolean).length;
        const percent = (completedCount / 500) * 100;
        return `
                <div class="lang-card ${currentLang === l.id ? 'selected' : ''}" data-lang="${l.id}">
                    <i class="${l.icon}" style="color:${l.color}; font-size:2.6rem;"></i>
                    <div class="lang-name">${l.name}</div>
                    <div class="lang-progress">${completedCount}/500 mastered</div>
                    <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
                </div>`;
      }).join('');
      document.querySelectorAll('.lang-card').forEach(c => c.addEventListener('click', (e) => {
        const lang = c.dataset.lang;
        if (lang && lang !== currentLang) {
          currentLang = lang;
          renderLanguageGrid();
          showLanguageContent(lang);
        }
      }));
    }

    function showLanguageContent(langId) {
      document.getElementById('mainContent').style.display = 'grid';
      const langObj = languages.find(l => l.id === langId);
      document.getElementById('selectedLangName').textContent = langObj.name;

      const prog = userProgress[langId] || { completed: new Array(500).fill(false) };
      const firstMissing = prog.completed.findIndex(c => !c);
      currentLevel = firstMissing === -1 ? 500 : firstMissing + 1;
      renderLevelsList(langId);
      loadQuestion(langId, currentLevel);
    }

    function renderLevelsList(langId) {
      const prog = userProgress[langId] || { completed: new Array(500).fill(false) };
      const completedCount = prog.completed.filter(Boolean).length;
      document.getElementById('totalProgress').innerText = `${completedCount}/500`;

      const container = document.getElementById('levelsList');
      let html = '';
      for (let i = 1; i <= 500; i++) {
        const completed = prog.completed[i - 1];
        const active = (i === currentLevel);
        const difficulty = i <= 100 ? 'easy' : i <= 200 ? 'medium' : i <= 300 ? 'hard' : 'expert';
        html += `<div class="level-item ${completed ? 'completed' : ''} ${active ? 'active' : ''}" data-level="${i}">
                    <div><span style="font-weight:700;">Level ${i}</span></div>
                    <span class="level-difficulty difficulty-${difficulty}">${difficulty}</span>
                </div>`;
      }
      container.innerHTML = html;
      container.querySelectorAll('.level-item').forEach(el => {
        el.addEventListener('click', () => {
          const lev = parseInt(el.dataset.level);
          if (!isNaN(lev)) { currentLevel = lev; renderLevelsList(langId); loadQuestion(langId, lev); }
        });
      });
    }

    function loadQuestion(langId, level) {
      const q = questionsDB[langId][level - 1];
      document.getElementById('questionTitle').innerHTML = `Level ${level}: ${q.title}`;
      document.getElementById('questionDescription').innerText = q.description;
      const badge = document.getElementById('difficultyBadge');
      badge.innerText = q.difficulty;
      badge.className = `level-difficulty difficulty-${q.difficulty}`;

      const saved = userProgress[langId]?.answers?.[level];
      document.getElementById('answerInput').value = saved || '';

      const completed = userProgress[langId]?.completed[level - 1];
      if (completed) {
        document.getElementById('feedback').className = 'feedback success';
        document.getElementById('feedback').innerHTML = '<i class="fas fa-check-circle"></i> Level completed!';
      } else {
        document.getElementById('feedback').className = 'feedback';
        document.getElementById('feedback').innerHTML = '';
      }

      const allDone = userProgress[langId]?.completed.every(Boolean);
      if (allDone) {
        document.getElementById('certLang').innerText = languages.find(l => l.id === langId).name;
        document.getElementById('certificate').classList.remove('hidden');
        document.getElementById('questionContainer').classList.add('hidden');
      } else {
        document.getElementById('certificate').classList.add('hidden');
        document.getElementById('questionContainer').classList.remove('hidden');
      }
    }

    function validateAnswer(answer, question, lang) {
      if (!answer || answer.length < 20) return false;
      const codeRegex = /[{}()[\]]|function|class|const|let|=>|def|public|private|interface|func|impl|fn/;
      return codeRegex.test(answer);
    }

    async function submitAnswer() {
      if (!currentUser) return;
      const answer = document.getElementById('answerInput').value.trim();
      if (!answer) { showFeedback('Write something first', 'error'); return; }
      const valid = validateAnswer(answer, null, currentLang);
      if (valid) {
        userProgress[currentLang].completed[currentLevel - 1] = true;
        if (!userProgress[currentLang].answers) userProgress[currentLang].answers = {};
        userProgress[currentLang].answers[currentLevel] = answer;
        await saveUserProgress(currentUser.uid);
        showFeedback('✨ Correct!', 'success');
        if (currentLevel < 500) {
          setTimeout(() => {
            currentLevel++;
            renderLevelsList(currentLang);
            loadQuestion(currentLang, currentLevel);
          }, 600);
        } else {
          renderLevelsList(currentLang);
          loadQuestion(currentLang, currentLevel);
        }
      } else {
        showFeedback('❌ Not quite. Check syntax & completeness', 'error');
      }
    }

    function showFeedback(msg, type) {
      const fb = document.getElementById('feedback');
      fb.className = `feedback ${type}`;
      fb.innerHTML = msg;
    }

    function resetLevel() {
      if (!currentUser || !confirm('Reset this level?')) return;
      userProgress[currentLang].completed[currentLevel - 1] = false;
      delete userProgress[currentLang].answers?.[currentLevel];
      document.getElementById('answerInput').value = '';
      saveUserProgress(currentUser.uid);
      renderLevelsList(currentLang);
      loadQuestion(currentLang, currentLevel);
    }

    auth.onAuthStateChanged(async (user) => {
      if (user) {
        currentUser = user;
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('userName').innerText = user.displayName || user.email;
        await loadUserProgress(user.uid);
      } else {
        document.getElementById('authScreen').style.display = 'flex';
        document.getElementById('mainApp').style.display = 'none';
      }
    });

    document.getElementById('googleSignIn').addEventListener('click', () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()));
    document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut());
    document.getElementById('submitAnswer').addEventListener('click', submitAnswer);
    document.getElementById('resetLevel').addEventListener('click', resetLevel);
    document.getElementById('previousLevel').addEventListener('click', () => { if (currentLevel > 1) { currentLevel--; renderLevelsList(currentLang); loadQuestion(currentLang, currentLevel); } });
    document.getElementById('nextLevel').addEventListener('click', () => { if (currentLevel < 500) { currentLevel++; renderLevelsList(currentLang); loadQuestion(currentLang, currentLevel); } });
    document.addEventListener('keydown', (e) => { if (e.ctrlKey && e.key === 'Enter') submitAnswer(); });
  </script>
</body>

</html>
