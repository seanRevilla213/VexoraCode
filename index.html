<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>Vexora•Code · level‑locked quiz</title>
  <!-- Font Awesome 6 & Google Fonts -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,800;14..32,900&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-deep: #0a0c14;
      --bg-elevated: #141b2b;
      --surface: #1e293b;
      --primary: #3b82f6;
      --primary-glow: #2563eb;
      --accent: #f59e0b;
      --success: #10b981;
      --danger: #ef4444;
      --text-head: #ffffff;
      --text-body: #e2e8f0;
      --text-muted: #94a3b8;
      --border-glow: rgba(59,130,246,0.5);
      --easy: #34d399;
      --medium: #fbbf24;
      --hard: #f87171;
      --expert: #c084fc;
      --font-sans: 'Inter', system-ui, sans-serif;
      --font-mono: 'Fira Code', monospace;
    }

    body {
      background: linear-gradient(145deg, #afb5bf 0%, #030614 100%);
      font-family: var(--font-sans);
      color: var(--text-body);
      min-height: 100vh;
    }

    .app-wrapper { max-width: 1400px; margin: 0 auto; padding: 1rem 2rem; }

    .auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
    .auth-card {
      background: rgba(10,16,28,0.9); backdrop-filter: blur(20px); border-radius: 3.5rem; padding: 3rem 1rem;
      width: min(500px,96%); box-shadow: 0 30px 60px -10px #000, 0 0 0 2px #3b82f630 inset; text-align: center;
    }
    .auth-title { font-size: 3.8rem; font-weight: 900; color: white; text-shadow: 0 0 20px #3b82f6; border-bottom: 4px solid transparent; border-image: linear-gradient(90deg, #f59e0b, #3b82f6, #a78bfa) 1; border-bottom-style: solid; display: inline-flex; gap: 0.8rem; margin-bottom: 1rem; }
    .google-btn { width: 100%; padding: 1.1rem; background: white; border-radius: 4rem; font-size: 1.3rem; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 1.2rem; cursor: pointer; transition: 0.2s; color: #1e293b; border: none; box-shadow: 0 20px 30px -8px black; }
    .google-btn:hover { background: #f0f9ff; transform: scale(1.02) translateY(-3px); }

    .main-app { display: none; }
    .navbar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.8rem; }
    .logo { font-size: 2.5rem; font-weight: 900; color: white; text-shadow: 0 0 15px #3b82f6; border-bottom: 3px solid transparent; border-image: linear-gradient(90deg,#f59e0b,#3b82f6,#c084fc) 1; border-bottom-style: solid; display: flex; align-items: center; gap: 0.6rem; }
    .user-menu { background: rgba(0,0,0,0.4); backdrop-filter: blur(12px); padding: 0.4rem 1.5rem 0.4rem 1.8rem; border-radius: 4rem; border: 1px solid #3b82f630; display: flex; align-items: center; gap: 1rem; }
    #userName { font-weight: 600; color: white; max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
    .logout-btn { background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 0.35rem 1.2rem; border-radius: 3rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .logout-btn:hover { background: var(--danger); color: #0b1120; border-color: transparent; }

    /* language matrix */
    .lang-section-header {
      display: flex; align-items: center; justify-content: space-between; margin: 1rem 0 1.5rem;
      background: rgba(10,16,28,0.6); backdrop-filter: blur(10px); padding: 1rem 2rem; border-radius: 5rem;
      border: 1px solid rgba(255,255,255,0.02); cursor: pointer; user-select: none; transition: 0.2s;
    }
    .lang-section-header:hover { background: #1e324a; border-color: var(--primary); box-shadow: 0 0 20px #3b82f670; }
    .lang-section-header .arrow { font-size: 2rem; transition: transform 0.4s ease; color: var(--accent); }
    .lang-section-header.collapsed .arrow { transform: rotate(-90deg); }
    .lang-section-header h2 { font-size: 2rem; font-weight: 700; color: white; text-shadow: 0 2px 10px black; }
    .lang-section-header h2 i { margin-right: 1rem; color: var(--primary); }

    .languages-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px,1fr)); gap: 1.4rem; margin: 1rem 0 2rem; transition: opacity 0.3s; }
    .languages-grid.collapsed { display: none; }

    .lang-card {
      background: rgba(18,26,40,0.8); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.02);
      border-radius: 2rem; padding: 1.5rem 0.8rem; text-align: center; transition: 0.25s; box-shadow: 0 15px 30px -12px black;
      cursor: pointer; position: relative; overflow: hidden;
    }
    .lang-card::after { content: ''; position: absolute; inset: 0; border-radius: 2rem; padding: 2px; background: linear-gradient(145deg, #3b82f6, #f59e0b, #c084fc); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; opacity: 0; transition: 0.3s; }
    .lang-card:hover::after { opacity: 0.8; }
    .lang-card:hover { transform: translateY(-6px) scale(1.02); background: #1f2a44; }
    .lang-card.selected { border: 2px solid transparent; background: #1e2f4a; box-shadow: 0 0 35px #2563eb; }

    .lang-icon { font-size: 3.2rem; filter: drop-shadow(0 8px 12px black); }
    .lang-name { font-weight: 800; font-size: 1.4rem; margin: 0.6rem 0 0.2rem; color: white; }
    .lang-progress { font-size: 1rem; font-weight: 600; color: var(--text-muted); display: flex; justify-content: center; gap: 0.3rem; }
    .progress-bar { height: 6px; background: #0f1a2b; border-radius: 10px; margin: 0.8rem 1.2rem 0.4rem; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent), #c084fc); width: 0%; border-radius: 10px; }

    /* QUIZ PANEL */
    .quiz-panel {
      background: rgba(0,0,0,0.4); backdrop-filter: blur(14px); border-radius: 2.5rem; padding: 2rem;
      margin: 1.5rem 0 2rem; border: 1px solid #3b82f670;
    }

    .quiz-header {
      display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .lang-indicator {
      background: #0b1a2b; border-radius: 4rem; padding: 0.5rem 1.8rem; font-weight: 700; font-size: 1.5rem;
      border: 1px solid #3b82f6; display: inline-flex; align-items: center; gap: 0.8rem;
    }
    .difficulty-badge {
      font-weight: 800; padding: 0.4rem 1.8rem; border-radius: 3rem; background: #1f2a44;
    }
    .difficulty-badge[data-diff="easy"] { background: #065f46; color: #d1fae5; }
    .difficulty-badge[data-diff="medium"] { background: #92400e; color: #fef3c7; }
    .difficulty-badge[data-diff="hard"] { background: #991b1b; color: #fee2e2; }
    .difficulty-badge[data-diff="expert"] { background: #6b21a8; color: #f3e8ff; }

    .question-text {
      font-size: 1.8rem; font-weight: 600; color: white; margin: 1rem 0 1.8rem; line-height: 1.5;
    }

    /* multiple choice zone */
    .mcq-options {
      display: flex; flex-direction: column; gap: 1rem; margin: 2rem 0 2rem;
    }
    .mcq-option {
      background: #1a2639; border: 2px solid #2d3b52; border-radius: 4rem; padding: 1rem 2rem;
      font-size: 1.3rem; font-weight: 500; color: white; cursor: pointer; transition: 0.2s;
      display: flex; align-items: center; gap: 1.5rem;
    }
    .mcq-option:hover { background: #263b55; border-color: var(--primary); transform: scale(1.02); }
    .mcq-option.selected { background: #1e3f5e; border-color: var(--primary); box-shadow: 0 0 20px #3b82f6; }

    /* coding area */
    .code-editor {
      background: #0e1624; border-radius: 2rem; padding: 1.5rem; border: 1px solid #3b82f640; margin: 1.5rem 0;
    }
    .code-editor textarea {
      width: 100%; background: #020614; border: none; border-radius: 1.2rem; padding: 1.5rem;
      font-family: var(--font-mono); font-size: 1.2rem; color: #bbd7fb; resize: vertical; min-height: 180px;
      border: 1px solid #1e344b; outline: none;
    }
    .code-editor textarea:focus { border-color: var(--primary); box-shadow: 0 0 20px #1e4b8f; }

    .output-console {
      background: #0a0f1c; border-radius: 1.5rem; padding: 1rem 1.5rem; font-family: var(--font-mono);
      border-left: 6px solid var(--primary); margin-top: 1rem; white-space: pre-wrap; font-size: 1.1rem;
      color: #b0c4de; max-height: 150px; overflow: auto;
    }
    .error-console { border-left-color: var(--danger); background: #2f1520; color: #fca5a5; }

    .quiz-actions {
      display: flex; flex-wrap: wrap; gap: 1.2rem; margin-top: 2rem; align-items: center;
    }
    .primary-btn, .secondary-btn, .success-btn, .next-btn {
      border: none; padding: 1rem 2.2rem; font-weight: 700; border-radius: 4rem; font-size: 1.2rem;
      display: inline-flex; align-items: center; gap: 0.8rem; cursor: pointer; transition: 0.2s;
    }
    .primary-btn { background: linear-gradient(145deg, #3b82f6, #2563eb); color: white; box-shadow: 0 10px 20px -5px #1e3a8a; }
    .primary-btn:hover { transform: scale(1.03); background: #2563eb; }
    .success-btn { background: #10b981; color: white; }
    .success-btn:hover { background: #059669; transform: scale(1.03); }
    .secondary-btn { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
    .secondary-btn:hover { background: rgba(59,130,246,0.2); }
    .next-btn { background: #f59e0b; color: black; font-weight: 800; box-shadow: 0 0 15px #f59e0b; }
    .next-btn:hover { background: #d97706; transform: scale(1.03); }

    /* progress celebration card */
    .progress-celebration {
      background: linear-gradient(145deg, #1e2b3f, #0f172a); border-radius: 2rem; padding: 1.8rem 2.2rem;
      margin: 1rem 0 2rem; border: 2px solid #f59e0b; box-shadow: 0 0 50px rgba(245,158,11,0.3);
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1.5rem;
      animation: glowPulse 2s infinite;
    }
    @keyframes glowPulse { 0% { border-color: #f59e0b; } 50% { border-color: #3b82f6; } 100% { border-color: #f59e0b; } }
    .progress-message { font-size: 1.7rem; font-weight: 800; color: white; display: flex; align-items: center; gap: 1.2rem; }
    .progress-stats { font-size: 1.4rem; background: black; padding: 0.7rem 2rem; border-radius: 4rem; color: #fbbf24; font-weight: 700; }

    .matrix-footer { text-align: right; color: var(--text-muted); margin-top: 2rem; border-top: 1px dashed #3b82f630; padding-top: 1rem; }
  </style>
</head>
<body>
  <!-- AUTH -->
  <div id="authScreen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-title"><i class="fa-solid fa-code"></i>Vexora•Code</div>
      <div style="font-size:1.4rem; margin-bottom:2rem;">interactive quiz · code & learn</div>
      <button class="google-btn" id="googleSignIn"><i class="fab fa-google" style="color:#4285F4; font-size:1.8rem;"></i> continue with Google</button>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="mainApp" class="main-app">
    <div class="app-wrapper">
      <nav class="navbar">
        <div class="logo"><i class="fas fa-terminal"></i> Vexora•Code</div>
        <div class="user-menu"><i class="fa-regular fa-user"></i><span id="userName">Coder</span><button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> exit</button></div>
      </nav>

      <!-- Language matrix (collapsible) -->
      <div class="lang-section-header" id="toggleLangBtn">
        <h2><i class="fas fa-cubes"></i> language matrix</h2>
        <span class="arrow"><i class="fas fa-chevron-down"></i></span>
      </div>
      <div id="languageGrid" class="languages-grid"></div>

      <!-- QUIZ PANEL -->
      <div id="quizPanel" class="quiz-panel">
        <div class="quiz-header">
          <span class="lang-indicator" id="quizLangDisplay"><i class="fab fa-js"></i> JavaScript · level <span id="levelDisplaySpan">1</span>/500</span>
          <span class="difficulty-badge" id="difficultyBadge" data-diff="easy">easy</span>
        </div>
        <div id="quizQuestion" class="question-text">// Write a function to reverse a string.</div>

        <!-- dynamic container: MCQ or coding -->
        <div id="quizDynamicArea"></div>

        <!-- output console -->
        <div id="outputConsole" class="output-console"><i class="fa fa-terminal"></i>  run your code to see output / errors</div>

        <!-- action buttons -->
        <div class="quiz-actions" id="quizActionRow">
          <button class="primary-btn" id="runCodeBtn"><i class="fas fa-play"></i> run code</button>
          <button class="success-btn" id="submitAnswerBtn"><i class="fas fa-check"></i> submit answer</button>
          <button class="secondary-btn" id="nextQuestionBtn"><i class="fas fa-arrow-right"></i> next question</button>
          <button class="next-btn" id="nextLevelBtn" style="display: none;"><i class="fas fa-rocket"></i> next level</button>
        </div>

        <!-- celebration card (initially hidden) -->
        <div id="progressCelebrationCard" class="progress-celebration" style="display: none;"></div>
      </div>

      <div class="matrix-footer"><i class="fas fa-globe"></i> 11 languages · progressive levels 1‑500 · instant feedback</div>
    </div>
  </div>

  <script>
    (function() {
      // ---------- Firebase ----------
      const firebaseConfig = {
        apiKey: "AIzaSyDhhFKYAx1PPjhwV53H18cztT0MYvLxJgs",
        authDomain: "vexoracode-8c9ed.firebaseapp.com",
        projectId: "vexoracode-8c9ed",
        storageBucket: "vexoracode-8c9ed.firebasestorage.app",
        messagingSenderId: "787559922648",
        appId: "1:787559922648:web:308047356509bbcaff10ad"
      };
      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      const db = firebase.firestore();

      // ---------- Languages ----------
      const languages = [
        { id: 'javascript', name: 'JavaScript', icon: 'fab fa-js', color: '#f7df1e' },
        { id: 'python', name: 'Python', icon: 'fab fa-python', color: '#3776ab' },
        { id: 'java', name: 'Java', icon: 'fab fa-java', color: '#b07219' },
        { id: 'cpp', name: 'C++', icon: 'fas fa-code', color: '#00599c' },
        { id: 'csharp', name: 'C#', icon: 'fas fa-code', color: '#9b4f96' },
        { id: 'go', name: 'Go', icon: 'fab fa-golang', color: '#00add8' },
        { id: 'rust', name: 'Rust', icon: 'fab fa-rust', color: '#b7410e' },
        { id: 'swift', name: 'Swift', icon: 'fab fa-swift', color: '#f05138' },
        { id: 'php', name: 'PHP', icon: 'fab fa-php', color: '#777bb4' },
        { id: 'html', name: 'HTML', icon: 'fab fa-html5', color: '#e34c26' },
        { id: 'css', name: 'CSS', icon: 'fab fa-css3-alt', color: '#264de4' }
      ];

      // ---------- Question bank (always based on current level) ----------
      function generateQuestionForLevel(langId, level) {
        // level is 0‑based (0 → level1) ; we store completed up to 500
        const type = Math.random() < 0.6 ? 'coding' : 'mcq';
        let difficulty = 'easy';
        if (level > 300) difficulty = 'expert';
        else if (level > 180) difficulty = 'hard';
        else if (level > 70) difficulty = 'medium';

        const lang = languages.find(l => l.id === langId) || languages[0];
        const baseQuestion = `[${lang.name} - level ${level+1}] `;

        if (type === 'mcq') {
          return {
            type: 'mcq',
            difficulty,
            question: baseQuestion + `Which syntax is correct for ${langId}?`,
            options: [
              `option A: common mistake in ${langId}`,
              `option B: ✅ correct answer (always B)`,
              `option C: error‑prone variant`,
              `option D: outdated pattern`
            ],
            correctIndex: 1   // B is always correct (for demo)
          };
        } else {
          const tasks = [
            `Write a function that reverses a string.`,
            `Create a function to check if a number is prime.`,
            `Implement a recursive fibonacci function.`,
            `Write a loop that prints numbers 1 to 10.`,
            `Define a class with a constructor and a method.`,
            `Write a function that returns the sum of an array.`,
            `Use a conditional to check even/odd.`,
            `Create a simple promise / async function.`
          ];
          return {
            type: 'coding',
            difficulty,
            question: baseQuestion + tasks[level % tasks.length],
            starterCode: {
              javascript: '// write your solution here\nfunction solution() {\n  \n}',
              python: '# write your solution here\ndef solution():\n    pass',
              java: '// write your solution\npublic class Main {\n    public static void main(String[] args) {}\n}',
              cpp: '// write your solution\n#include <iostream>\nint main() {\n    return 0;\n}',
              csharp: '// write your solution\nusing System;\nclass Program { static void Main() {} }',
              go: '// write your solution\npackage main\nfunc main() {}',
              rust: '// write your solution\nfn main() {}',
              swift: '// write your solution\nimport Foundation',
              php: '<?php\n// write your solution\n?>',
              html: '<!-- write your html -->',
              css: '/* write your css */'
            }[langId] || '// write your code'
          };
        }
      }

      // ---------- State ----------
      let currentUser = null;
      let userProgress = {};        // { langId: { completed: boolean[500], score } }
      let selectedLangId = 'javascript';
      let currentQuestion = null;
      let selectedMcqIndex = null;
      let userCode = '';

      // Helper: get current level for a language (first incomplete level, 0‑based) and also total completed count
      function getCurrentLevel(langId) {
        const prog = userProgress[langId];
        if (!prog || !prog.completed) return 0;
        const arr = prog.completed;
        for (let i = 0; i < arr.length; i++) {
          if (!arr[i]) return i;
        }
        return 499; // all completed, stay at max
      }

      function getCompletedCount(langId) {
        const prog = userProgress[langId];
        if (!prog || !prog.completed) return 0;
        return prog.completed.filter(Boolean).length;
      }

      // Save progress to firestore
      async function saveUserProgress(uid) {
        if (!uid) return;
        try {
          await db.collection('userProgress').doc(uid).set({ progress: userProgress, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        } catch (e) {}
      }

      // Render language grid
      function renderLanguageGrid() {
        const grid = document.getElementById('languageGrid');
        grid.innerHTML = languages.map(l => {
          const prog = userProgress[l.id] || { completed: new Array(500).fill(false) };
          const completedCount = prog.completed.filter(Boolean).length;
          const percent = (completedCount / 500) * 100;
          const selectedClass = (selectedLangId === l.id) ? 'selected' : '';
          return `<div class="lang-card ${selectedClass}" data-lang="${l.id}">
            <i class="${l.icon}" style="color:${l.color}; font-size:3.2rem;"></i>
            <div class="lang-name">${l.name}</div>
            <div class="lang-progress"><i class="fa-solid fa-trophy" style="color:gold;"></i> ${completedCount}/500</div>
            <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
          </div>`;
        }).join('');

        document.querySelectorAll('.lang-card').forEach(card => {
          card.addEventListener('click', (e) => {
            const langId = card.dataset.lang;
            document.querySelectorAll('.lang-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            selectedLangId = langId;
            loadCurrentLevelQuestion(langId);
            // Hide celebration when switching language
            document.getElementById('progressCelebrationCard').style.display = 'none';
          });
        });
      }

      // Load question for the CURRENT incomplete level of given language
      function loadCurrentLevelQuestion(langId) {
        selectedMcqIndex = null;
        document.getElementById('nextLevelBtn').style.display = 'none'; // hide next level initially
        document.getElementById('progressCelebrationCard').style.display = 'none'; // hide celebration card
        const level = getCurrentLevel(langId);
        currentQuestion = generateQuestionForLevel(langId, level);
        updateQuestionUI(langId, level);
      }

      // Load a new question for the same level (doesn't advance, just refreshes)
      function loadNextQuestionSameLevel() {
        if (!selectedLangId) return;
        selectedMcqIndex = null;
        const level = getCurrentLevel(selectedLangId); // still same level (incomplete)
        currentQuestion = generateQuestionForLevel(selectedLangId, level);
        updateQuestionUI(selectedLangId, level);
        document.getElementById('nextLevelBtn').style.display = 'none'; // hide next level until correct
        document.getElementById('progressCelebrationCard').style.display = 'none';
      }

      // update UI with currentQuestion + level
      function updateQuestionUI(langId, level) {
        const lang = languages.find(l => l.id === langId) || languages[0];
        const completed = getCompletedCount(langId);
        document.getElementById('quizLangDisplay').innerHTML = `<i class="${lang.icon}" style="color:${lang.color};"></i> ${lang.name} · level <span id="levelDisplaySpan">${level+1}</span>/500 (${completed} solved)`;
        document.getElementById('difficultyBadge').innerText = currentQuestion.difficulty;
        document.getElementById('difficultyBadge').setAttribute('data-diff', currentQuestion.difficulty);
        document.getElementById('quizQuestion').innerText = currentQuestion.question;

        const dynamicArea = document.getElementById('quizDynamicArea');
        if (currentQuestion.type === 'mcq') {
          const options = currentQuestion.options.map((opt, idx) => {
            const selClass = (selectedMcqIndex === idx) ? 'selected' : '';
            return `<div class="mcq-option ${selClass}" data-opt-index="${idx}"><i class="fa-regular fa-circle"></i> ${opt}</div>`;
          }).join('');
          dynamicArea.innerHTML = `<div class="mcq-options">${options}</div>`;
          document.querySelectorAll('.mcq-option').forEach(el => {
            el.addEventListener('click', (e) => {
              document.querySelectorAll('.mcq-option').forEach(opt => opt.classList.remove('selected'));
              el.classList.add('selected');
              selectedMcqIndex = parseInt(el.dataset.optIndex, 10);
            });
          });
        } else {
          const starter = currentQuestion.starterCode || '// write your code';
          userCode = starter;
          dynamicArea.innerHTML = `<div class="code-editor"><textarea id="codeTextarea">${starter.replace(/</g,'&lt;')}</textarea></div>`;
          const ta = document.getElementById('codeTextarea');
          ta.value = starter;
          ta.addEventListener('input', (e) => { userCode = e.target.value; });
        }
        // reset console
        document.getElementById('outputConsole').innerHTML = '<i class="fa fa-terminal"></i>  run your code to see output / errors';
        document.getElementById('outputConsole').classList.remove('error-console');
      }

      // ---------- Run code (simulated) ----------
      function runCode() {
        const consoleDiv = document.getElementById('outputConsole');
        if (currentQuestion.type === 'coding') {
          const code = document.getElementById('codeTextarea')?.value || userCode;
          if (code.includes('error') || code.includes('throw') || code.includes('syntax')) {
            consoleDiv.innerHTML = '<i class="fa fa-exclamation-triangle" style="color:#f87171;"></i>  SyntaxError: unexpected token (simulated)';
            consoleDiv.classList.add('error-console');
          } else if (code.trim() === '') {
            consoleDiv.innerHTML = '<i class="fa fa-circle-exclamation"></i>  no code to run';
            consoleDiv.classList.remove('error-console');
          } else {
            consoleDiv.innerHTML = '<i class="fa fa-check-circle" style="color:#4ade80;"></i>  Program executed (simulated). Output: Hello, world!';
            consoleDiv.classList.remove('error-console');
          }
        } else {
          consoleDiv.innerHTML = '<i class="fa fa-info-circle"></i>  MCQ: select an option and use "submit answer".';
          consoleDiv.classList.remove('error-console');
        }
      }

      // ---------- Show progress celebration card ----------
      function showProgressCelebration(langId, completedNow) {
        const lang = languages.find(l => l.id === langId) || languages[0];
        const totalCompleted = getCompletedCount(langId);
        const percent = ((totalCompleted / 500) * 100).toFixed(1);
        const card = document.getElementById('progressCelebrationCard');
        card.innerHTML = `
          <div class="progress-message">
            <i class="${lang.icon}" style="color:${lang.color}; font-size:3rem;"></i>
            🎉 level ${completedNow+1} completed in ${lang.name}!
          </div>
          <div class="progress-stats">
            <i class="fa-solid fa-star" style="color:gold;"></i>  ${totalCompleted}/500  (${percent}%)
          </div>
        `;
        card.style.display = 'flex';
      }

      // ---------- Submit answer ----------
      async function submitAnswer() {
        if (!currentUser || !selectedLangId || !currentQuestion) return;
        const consoleDiv = document.getElementById('outputConsole');
        let isCorrect = false;

        if (currentQuestion.type === 'mcq') {
          if (selectedMcqIndex === null) {
            consoleDiv.innerHTML = '<i class="fa fa-exclamation"></i>  Please select an option first.';
            consoleDiv.classList.add('error-console');
            return;
          }
          isCorrect = (selectedMcqIndex === currentQuestion.correctIndex);  // dynamic correct index
          if (isCorrect) {
            consoleDiv.innerHTML = '<i class="fa fa-check-circle" style="color:#4ade80;"></i>  Correct! Well done.';
            consoleDiv.classList.remove('error-console');
          } else {
            // Reveal the correct answer on wrong attempt
            const correctAnswerText = currentQuestion.options[currentQuestion.correctIndex];
            consoleDiv.innerHTML = `<i class="fa fa-times-circle" style="color:#f87171;"></i>  Incorrect. The correct answer is: "${correctAnswerText}".`;
            consoleDiv.classList.add('error-console');
            return;   // wrong → no progress
          }
        } else { // coding
          const code = document.getElementById('codeTextarea')?.value || userCode;
          if (code.includes('error') || code.includes('throw') || code.includes('syntax')) {
            consoleDiv.innerHTML = '<i class="fa fa-times-circle"></i>  Your code has errors. Fix and run again.';
            consoleDiv.classList.add('error-console');
            return;
          } else {
            // naive acceptance: contains "function" or "def" or "public"
            if (code.includes('function') || code.includes('def ') || code.includes('public') || code.includes('class')) {
              isCorrect = true;
              consoleDiv.innerHTML = '<i class="fa fa-check-circle"></i>  Code accepted (simulated). Good job!';
              consoleDiv.classList.remove('error-console');
            } else {
              consoleDiv.innerHTML = '<i class="fa fa-times-circle"></i>  Code does not meet requirements.';
              consoleDiv.classList.add('error-console');
              return;
            }
          }
        }

        // ---------- CORRECT ----------
        // Mark current level as completed
        const level = getCurrentLevel(selectedLangId); // 0‑based
        if (!userProgress[selectedLangId]) userProgress[selectedLangId] = { completed: new Array(500).fill(false) };
        userProgress[selectedLangId].completed[level] = true;
        await saveUserProgress(currentUser.uid);
        renderLanguageGrid();   // update progress bars

        // Update the header to show new completed count
        const completed = getCompletedCount(selectedLangId);
        const lang = languages.find(l => l.id === selectedLangId);
        document.getElementById('quizLangDisplay').innerHTML = `<i class="${lang.icon}" style="color:${lang.color};"></i> ${lang.name} · level <span id="levelDisplaySpan">${level+1}</span>/500 (${completed} solved)`;

        // Show celebration card with updated progress
        showProgressCelebration(selectedLangId, level);

        // Show "next level" button
        document.getElementById('nextLevelBtn').style.display = 'inline-flex';
      }

      // ---------- Next level ----------
      function nextLevel() {
        // advance to next incomplete level (which is the current level+1 because we just completed current)
        // reload question for that new level
        loadCurrentLevelQuestion(selectedLangId);
        // nextLevelBtn hidden inside loadCurrentLevelQuestion
      }

      // ---------- Random / Next question (now just fresh question for same level) ----------
      function loadNextQuestion() {
        loadNextQuestionSameLevel();
      }

      // ---------- Load user progress ----------
      function initProgress() {
        let p = {};
        languages.forEach(l => { p[l.id] = { completed: new Array(500).fill(false), score: 0 }; });
        return p;
      }

      async function loadUserProgress(uid) {
        try {
          const doc = await db.collection('userProgress').doc(uid).get();
          if (doc.exists) userProgress = doc.data().progress || initProgress();
          else { userProgress = initProgress(); await saveUserProgress(uid); }
        } catch { userProgress = initProgress(); }
        renderLanguageGrid();
        if (!selectedLangId) selectedLangId = languages[0].id;
        loadCurrentLevelQuestion(selectedLangId);
      }

      // ---------- Event binding ----------
      document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('googleSignIn').addEventListener('click', () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()));
        document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut());
        document.getElementById('toggleLangBtn').addEventListener('click', (e) => {
          document.getElementById('languageGrid').classList.toggle('collapsed');
          e.currentTarget.classList.toggle('collapsed');
        });
        document.getElementById('runCodeBtn').addEventListener('click', runCode);
        document.getElementById('submitAnswerBtn').addEventListener('click', submitAnswer);
        document.getElementById('nextQuestionBtn').addEventListener('click', () => {
          loadNextQuestion();
        });
        document.getElementById('nextLevelBtn').addEventListener('click', nextLevel);
      });

      auth.onAuthStateChanged(async user => {
        if (user) {
          currentUser = user;
          document.getElementById('authScreen').style.display = 'none';
          document.getElementById('mainApp').style.display = 'block';
          document.getElementById('userName').innerText = user.displayName || user.email;
          await loadUserProgress(user.uid);
        } else {
          document.getElementById('authScreen').style.display = 'flex';
          document.getElementById('mainApp').style.display = 'none';
        }
      });
    })();
  </script>
</body>
</html>
